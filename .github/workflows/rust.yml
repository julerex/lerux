name: seL4 smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-aarch64:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker build -t lerux-dev docker/

      - name: Fetch, build SDK, smoke test
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" -w /work lerux-dev \
            bash -c 'set -euo pipefail
              just fetch
              just build-sdk
              just test'