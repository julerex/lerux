name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly-2026-05-24
        components: rustfmt
    - name: Check formatting
      run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly-2026-05-24
        components: clippy, rust-src
    - name: Add no_std target for clippy
      run: rustup target add x86_64-unknown-none
    - name: Clippy
      run: |
        export RUST_TARGET_PATH="$PWD/targets"
        export RUSTFLAGS="-C debuginfo=2"
        cargo clippy --bin kernel --release --target x86_64-unknown-none

  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly-2026-05-24
        components: rust-src
    - name: Cargo check (kernel with custom target)
      run: make check

  trampolines:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly-2026-05-24
    - uses: extractions/setup-just@v2
    - name: Install NASM
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends nasm
    - name: Trampoline bytes match NASM (script)
      run: just validate-trampolines
    - name: Trampoline bytes match NASM (unit tests)
      run: cargo test -p trampoline-validation

  smoke:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly-2026-05-24
        components: rust-src, llvm-tools
    - uses: extractions/setup-just@v2
    - name: Install QEMU
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends qemu-system-x86
    - name: Direct-boot serial smoke test
      run: |
        # llvm-objcopy ships with the llvm-tools rustup component; put it on PATH.
        export PATH="$(dirname "$(rustc --print target-libdir)")/bin:$PATH"
        just smoke
    - name: Upload serial log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: qemu-serial-log
        path: qemu-serial.log
        if-no-files-found: ignore

  initfs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly-2026-05-24
    - uses: extractions/setup-just@v2
    - name: Initfs archiver round-trip test
      run: just test-initfs
    - name: Build initfs image
      run: just build-initfs

  smoke-userspace:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly-2026-05-24
        components: rust-src, llvm-tools
    - name: Install relibc build toolchain
      run: rustup toolchain install nightly-2025-11-15 --component rust-src
    - uses: extractions/setup-just@v2
    - name: Install QEMU
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends qemu-system-x86 curl binutils
    - name: Cache in-tree sysroot
      uses: actions/cache@v4
      with:
        path: |
          .toolchain
          vendor/relibc/target
        key: lerux-sysroot-${{ hashFiles('vendor/relibc/**', 'userspace/runtime/**', 'scripts/build-sysroot.sh', 'targets/x86_64-unknown-redox.json') }}
        restore-keys: lerux-sysroot-
    - name: Build in-tree sysroot
      run: just build-sysroot
    - name: Add Redox userspace target
      run: rustup target add x86_64-unknown-redox --toolchain nightly-2026-05-24
    - name: Phase B userspace smoke test
      run: |
        export PATH="$(dirname "$(rustc --print target-libdir)")/bin:$PATH"
        just smoke-userspace
    - name: Upload serial log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: qemu-serial-userspace-log
        path: qemu-serial.log
        if-no-files-found: ignore

  check-only-rust:
    runs-on: ubuntu-latest
    needs: [smoke-userspace]
    steps:
    - uses: actions/checkout@v4
    - uses: extractions/setup-just@v2
    - name: Only Rust policy checks
      run: just check-only-rust

  # Fast host-only unit tests for the "100% coverage" goal (excl. redoxfs).
  # Complements the integration smokes. See docs/development/coverage.md and justfile.
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly-2026-05-24
        components: rust-src, llvm-tools
    - uses: extractions/setup-just@v2
    - name: Host unit tests (rmm + kernel cfg(test) + initfs-tools + workspace pieces)
      run: |
        export PATH="$(dirname "$(rustc --print target-libdir)")/bin:$PATH"
        just test
    - name: Quick coverage collection (report artifact; gate enforced later)
      run: |
        export PATH="$(dirname "$(rustc --print target-libdir)")/bin:$PATH"
        just coverage || echo "Coverage collection completed (or partial); see target/coverage/ artifacts"
    - name: Upload coverage reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: target/coverage/
        if-no-files-found: ignore
