name: seL4 smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MICROKIT_BOARDS: qemu_virt_aarch64,x86_64_generic,qemu_virt_riscv64
  # GHA cache keys cannot contain commas; keep in sync with MICROKIT_BOARDS.
  SDK_CACHE_SUFFIX: virt-aarch64-x86-riscv

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-18
          components: rustfmt, clippy

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Format and clippy
        run: just check

  sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: lerux-dev
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Restore workspace cache
        uses: actions/cache/restore@v4
        id: workspace-cache
        with:
          path: deps/workspace
          key: workspace-${{ hashFiles('deps/versions.toml', 'tools/lerux-cli/**') }}
          restore-keys: |
            workspace-

      - name: Restore SDK cache
        uses: actions/cache/restore@v4
        id: sdk-cache
        with:
          path: deps/sdk-cache
          key: sdk-${{ hashFiles('deps/versions.toml', 'tools/lerux-cli/**') }}-${{ env.SDK_CACHE_SUFFIX }}
          restore-keys: |
            sdk-${{ hashFiles('deps/versions.toml', 'tools/lerux-cli/**') }}-
            sdk-

      - name: Fetch and build SDK
        run: |
          docker run --rm \
            -e MICROKIT_BOARDS="${{ env.MICROKIT_BOARDS }}" \
            -v "${{ github.workspace }}:/work" -w /work lerux-dev \
            bash -c 'set -euo pipefail
              just fetch
              if [[ -d deps/sdk-cache/microkit-sdk ]]; then
                mkdir -p deps/workspace/microkit/release
                rm -rf deps/workspace/microkit/release/microkit-sdk*
                cp -a deps/sdk-cache/microkit-sdk deps/workspace/microkit/release/
              fi
              sdk_ready() {
                local sdk
                sdk="$(find deps/workspace/microkit/release -maxdepth 1 -type d -name "microkit-sdk*" | sort | tail -1)"
                [[ -n "${sdk}" ]] || return 1
                [[ -d "${sdk}/board/qemu_virt_aarch64/debug/include" ]] || return 1
                [[ -d "${sdk}/board/qemu_virt_riscv64/debug/include" ]] || return 1
                [[ -f "${sdk}/board/x86_64_generic/debug/elf/sel4_32.elf" ]] || return 1
              }
              if sdk_ready; then
                echo "==> SDK cache hit, skipping build-sdk"
              else
                just build-sdk
              fi
            '
          # Docker runs as root; host steps need write access under deps/.
          sudo chown -R "$(id -u):$(id -g)" deps

      - name: Normalize SDK path for host
        run: |
          set -euo pipefail
          sdk="$(find deps/workspace/microkit/release -maxdepth 1 -type d -name 'microkit-sdk*' | sort | tail -1)"
          if [[ -z "${sdk}" ]]; then
            echo "error: SDK not found under deps/workspace/microkit/release" >&2
            exit 1
          fi
          rm -f deps/.sdk-path
          echo "$(realpath "${sdk}")" > deps/.sdk-path

      - name: Save workspace cache
        if: steps.workspace-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: deps/workspace
          key: workspace-${{ hashFiles('deps/versions.toml', 'tools/lerux-cli/**') }}

      - name: Stage SDK for cache
        run: |
          set -euo pipefail
          sdk="$(cat deps/.sdk-path)"
          chmod -R a+rX "${sdk}"
          find "${sdk}/bin" -type f -exec chmod a+x {} +
          mkdir -p deps/sdk-cache
          rm -rf deps/sdk-cache/microkit-sdk
          cp -a "${sdk}" deps/sdk-cache/microkit-sdk

      - name: Save SDK cache
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: deps/sdk-cache
          key: sdk-${{ hashFiles('deps/versions.toml', 'tools/lerux-cli/**') }}-${{ env.SDK_CACHE_SUFFIX }}

      - name: Restore SP804 QEMU cache
        uses: actions/cache/restore@v4
        id: qemu-sp804-cache
        with:
          path: |
            deps/toolchains/qemu-sp804
            deps/toolchains/qemu-6.2.0-src
            deps/toolchains/qemu-6.2.0.tar.xz
          key: qemu-sp804-${{ hashFiles('support/qemu/arm-virt-sp804.patch', 'tools/lerux-cli/**') }}
          restore-keys: |
            qemu-sp804-

      - name: Build SP804 QEMU
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" -w /work lerux-dev \
            bash -c 'set -euo pipefail
              if [[ -x deps/toolchains/qemu-sp804/bin/qemu-system-aarch64 ]]; then
                echo "==> SP804 QEMU cache hit"
              else
                cargo run -q -p lerux-cli -- install sp804-qemu >/dev/null
              fi
            '
          sudo chown -R "$(id -u):$(id -g)" deps
          chmod +x deps/toolchains/qemu-sp804/bin/qemu-system-aarch64 2>/dev/null || true

      - name: Save SP804 QEMU cache
        if: always() && steps.qemu-sp804-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            deps/toolchains/qemu-sp804
            deps/toolchains/qemu-6.2.0-src
            deps/toolchains/qemu-6.2.0.tar.xz
          key: qemu-sp804-${{ hashFiles('support/qemu/arm-virt-sp804.patch', 'tools/lerux-cli/**') }}

      - name: Upload SDK bundle
        run: |
          set -euo pipefail
          sdk="$(cat deps/.sdk-path)"
          if [[ ! -d "${sdk}" ]]; then
            echo "error: SDK path from deps/.sdk-path does not exist: ${sdk}" >&2
            exit 1
          fi
          chmod -R a+rX "${sdk}"
          find "${sdk}/bin" -type f -exec chmod a+x {} +
          mkdir -p sdk-bundle
          cp deps/.sdk-path sdk-bundle/
          cp -a "${sdk}" sdk-bundle/microkit-sdk

      - uses: actions/upload-artifact@v4
        with:
          name: sdk
          path: sdk-bundle/
          retention-days: 1

  check-pd:
    needs: sdk
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: lerux-dev
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/download-artifact@v4
        with:
          name: sdk
          path: sdk-bundle

      - name: Install SDK from artifact
        run: |
          set -euo pipefail
          mkdir -p deps/workspace/microkit/release
          cp -a sdk-bundle/microkit-sdk deps/workspace/microkit/release/
          sdk="deps/workspace/microkit/release/$(basename sdk-bundle/microkit-sdk)"
          chmod -R a+rX "${sdk}"
          find "${sdk}/bin" -type f -exec chmod a+x {} +
          echo "/work/${sdk}" > deps/.sdk-path

      - name: Restore clippy cache
        uses: actions/cache/restore@v4
        id: clippy-cache
        with:
          path: build/target
          key: cargo-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-target-

      - name: Cross-target clippy
        id: clippy
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" -w /work lerux-dev \
            bash -c 'set -euo pipefail
              sdk="$(tr -d "\n" < deps/.sdk-path)"
              chmod -R a+rX "${sdk}"
              find "${sdk}/bin" -type f -exec chmod a+x {} +
              just check-pd
            '
          sudo chown -R "$(id -u):$(id -g)" build deps

      - name: Save clippy cache
        if: always() && steps.clippy-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: build/target
          key: cargo-target-${{ hashFiles('Cargo.lock') }}

  smoke:
    needs: sdk
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: aarch64
            board: qemu_virt_aarch64
            command: just test
          - id: x86_64
            board: x86_64_generic
            command: BOARD=x86_64_generic just test
          - id: riscv64
            board: qemu_virt_riscv64
            command: just test-riscv
          - id: virtio
            board: qemu_virt_aarch64_virtio
            command: just disk-img && just test-virtio
          - id: echo
            board: qemu_virt_aarch64_echo
            command: just test-echo
          - id: x86-echo
            board: x86_64_generic_echo
            command: just test-x86-echo
          - id: riscv-echo
            board: qemu_virt_riscv64_echo
            command: just test-riscv-echo
          - id: riscv-virtio
            board: qemu_virt_riscv64_virtio
            command: just disk-img && just test-riscv-virtio
          - id: init
            board: qemu_virt_aarch64_init
            command: just test-init
          - id: composed
            board: qemu_virt_aarch64_composed
            command: just disk-img && just test-composed
          - id: blk-composed
            board: qemu_virt_aarch64_blk_composed
            command: just disk-img && just test-blk-composed
          - id: http
            board: qemu_virt_aarch64_http
            command: just test-http
          - id: http-composed
            board: qemu_virt_aarch64_http_composed
            command: just test-http-composed
          - id: x86-http
            board: x86_64_generic_http
            command: just test-x86-http
          - id: riscv-http
            board: qemu_virt_riscv64_http
            command: just test-riscv-http
          - id: x86-virtio
            board: x86_64_generic_virtio
            command: just disk-img && just test-x86-virtio
          - id: blk
            board: qemu_virt_aarch64_blk
            command: just test-blk
          - id: riscv-blk
            board: qemu_virt_riscv64_blk
            command: just test-riscv-blk
          - id: x86-blk
            board: x86_64_generic_blk
            command: just test-x86-blk
          - id: net
            board: qemu_virt_aarch64_net
            command: just test-net
          - id: fetch
            board: qemu_virt_aarch64_fetch
            command: just test-fetch
          - id: fs
            board: qemu_virt_aarch64_fs
            command: just disk-img && just test-fs
          - id: net-composed
            board: qemu_virt_aarch64_net_composed
            command: just test-net-composed
          - id: ipc-composed
            board: qemu_virt_aarch64_ipc_composed
            command: just disk-img && just test-ipc-composed
          - id: workstation
            board: qemu_virt_aarch64_workstation
            command: just disk-img && just test-workstation
          - id: riscv-net
            board: qemu_virt_riscv64_net
            command: just test-riscv-net
          - id: x86-net
            board: x86_64_generic_net
            command: just test-x86-net
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: lerux-dev
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/download-artifact@v4
        with:
          name: sdk
          path: sdk-bundle

      - name: Install SDK from artifact
        run: |
          set -euo pipefail
          mkdir -p deps/workspace/microkit/release
          cp -a sdk-bundle/microkit-sdk deps/workspace/microkit/release/
          sdk="deps/workspace/microkit/release/$(basename sdk-bundle/microkit-sdk)"
          chmod -R a+rX "${sdk}"
          find "${sdk}/bin" -type f -exec chmod a+x {} +
          echo "/work/${sdk}" > deps/.sdk-path

      - name: Restore shared Cargo target cache
        uses: actions/cache/restore@v4
        with:
          path: build/target
          key: cargo-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-target-

      - name: Restore board build cache
        uses: actions/cache/restore@v4
        id: board-cache
        with:
          path: build/${{ matrix.board }}
          key: board-${{ matrix.id }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            board-${{ matrix.id }}-

      - name: Restore SP804 QEMU cache
        if: matrix.id == 'init' || matrix.id == 'composed' || matrix.id == 'blk-composed' || matrix.id == 'http-composed' || matrix.id == 'net-composed' || matrix.id == 'ipc-composed' || matrix.id == 'workstation'
        uses: actions/cache/restore@v4
        with:
          path: |
            deps/toolchains/qemu-sp804
            deps/toolchains/qemu-6.2.0-src
            deps/toolchains/qemu-6.2.0.tar.xz
          key: qemu-sp804-${{ hashFiles('support/qemu/arm-virt-sp804.patch', 'tools/lerux-cli/**') }}
          restore-keys: |
            qemu-sp804-

      - name: Ensure SP804 QEMU executable
        if: matrix.id == 'init' || matrix.id == 'composed' || matrix.id == 'blk-composed' || matrix.id == 'http-composed' || matrix.id == 'net-composed' || matrix.id == 'ipc-composed' || matrix.id == 'workstation'
        run: |
          set -euo pipefail
          qemu="deps/toolchains/qemu-sp804/bin/qemu-system-aarch64"
          if [[ ! -x "${qemu}" ]]; then
            echo "error: missing ${qemu}; sdk job should have built or cached SP804 QEMU" >&2
            exit 1
          fi
          chmod +x "${qemu}"

      - name: Smoke test (${{ matrix.id }})
        id: smoke
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" -w /work lerux-dev \
            bash -c 'set -euo pipefail
              sdk="$(tr -d "\n" < deps/.sdk-path)"
              chmod -R a+rX "${sdk}"
              find "${sdk}/bin" -type f -exec chmod a+x {} +
              ${{ matrix.command }}
            '
          sudo chown -R "$(id -u):$(id -g)" build deps

      - name: Save shared Cargo target cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: build/target
          key: cargo-target-${{ hashFiles('Cargo.lock') }}

      - name: Save board build cache
        if: always() && steps.board-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: build/${{ matrix.board }}
          key: board-${{ matrix.id }}-${{ hashFiles('Cargo.lock') }}
  # Phase 40: build reference package ELF(s) and upload as CI artifacts.
  package:
    needs: sdk
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: edit
            pd: edit
            board: qemu_virt_aarch64_workstation
          - name: chat-client
            pd: chat-client
            board: qemu_virt_aarch64_workstation
          - name: http-file-browser
            pd: http-file-browser
            board: qemu_virt_aarch64_workstation
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: lerux-dev
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/download-artifact@v4
        with:
          name: sdk
          path: sdk-bundle

      - name: Install SDK from artifact
        run: |
          set -euo pipefail
          mkdir -p deps/workspace/microkit/release
          cp -a sdk-bundle/microkit-sdk deps/workspace/microkit/release/
          sdk="deps/workspace/microkit/release/$(basename sdk-bundle/microkit-sdk)"
          chmod -R a+rX "${sdk}"
          find "${sdk}/bin" -type f -exec chmod a+x {} +
          echo "/work/${sdk}" > deps/.sdk-path

      - name: Restore shared Cargo target cache
        uses: actions/cache/restore@v4
        with:
          path: build/target
          key: cargo-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-target-

      - name: Build package ELF
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" -w /work lerux-dev \
            bash -c 'set -euo pipefail
              sdk="$(tr -d "\n" < deps/.sdk-path)"
              chmod -R a+rX "${sdk}"
              find "${sdk}/bin" -type f -exec chmod a+x {} +
              cargo run -p lerux-cli -- package build ${{ matrix.name }} --board ${{ matrix.board }}
              cargo run -p lerux-cli -- package pin ${{ matrix.name }} --board ${{ matrix.board }} --git-ref "${{ github.sha }}"
            '
          sudo chown -R "$(id -u):$(id -g)" build support deps

      - name: Upload package ELF
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.name }}-${{ matrix.board }}
          path: |
            build/${{ matrix.board }}/${{ matrix.pd }}.elf
            support/package-pins.toml
          if-no-files-found: error
