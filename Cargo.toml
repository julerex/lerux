# lerux kernel -- now fully self-contained (zero runtime Cargo dependencies).
# All former external crates (and the build-time toml) are inlined as
# lerux-* subdirectories directly under lerux-kernel/src/ (wired via
# #[path] attributes in lerux-kernel/src/main.rs). The pristine
# references remain in vendor/. See docs/vendored.md.
# The crate root is still this file.

[workspace]
resolver = "3"
members = [
    "userspace/initfs",
    "userspace/initfs-tools",
    "lerux-kernel/validation/trampolines",
    "lerux-kernel/tests/unit",
]
exclude = ["userspace/bootstrap"]
default-members = ["."]

[workspace.dependencies]
plain = "0.2.3"
anyhow = "1"
log = "0.4"
clap = { version = "4", features = ["cargo"] }

[package]
name = "kernel"
version = "0.5.12"
build = "build.rs"
edition = "2024"

[[bin]]
name = "kernel"
path = "lerux-kernel/src/main.rs"

[lints.clippy]
# Overflows are very, very bad in kernel code as it may provide an attack vector for
# userspace applications, and it is only checked in debug builds
# TODO: address occurrences and then deny
arithmetic_side_effects = "warn"
cast_ptr_alignment = "warn" # TODO: address occurrences and then deny
identity_op = "allow" # Used to allow stuff like 1 << 0 and 1 * 1024 * 1024
if_same_then_else = "allow" # Useful for adding comments about different branches
# Indexing a slice can cause panics and that is something we always want to avoid
# in kernel code. Use .get and return an error instead
# TODO: address occurrences and then deny
indexing_slicing = "warn"
many_single_char_names = "allow" # Useful in the syscall function
module_inception = "allow" # Used for context::context
# Not implementing default is sometimes useful in the case something has significant cost
# to allocate. If you implement default, it can be allocated without evidence using the
# ..Default::default() syntax. Not fun in kernel space
new_without_default = "allow"
not_unsafe_ptr_arg_deref = "deny"
or_fun_call = "allow" # Used to make it nicer to return errors, for example, .ok_or(Error::new(ESRCH))
precedence = "deny"
ptr_cast_constness = "deny"
too_many_arguments = "allow" # This is needed in some cases, like for syscall
# Avoid panicking in the kernel without information about the panic. Use expect
# TODO: address occurrences and then deny
unwrap_used = "warn"

[lints.rust]
static_mut_refs = "warn" # FIXME deny once all occurrences are fixed
# This is usually a serious issue - a missing import of a define where it is interpreted
# as a catch-all variable in a match, for example
unreachable_patterns = "deny"
unused_must_use = "deny" # Ensure that all must_use results are used
# "warn" would be ideal for the public + key-internal surface, but the kernel bin
# has a huge number of private items. We keep "allow" here for day-to-day `cargo test`
# / `cargo check` and drive the docstring requirement via:
#   - `cargo doc --document-private-items` (see `just docs`)
#   - manual passes + the plan's scope definition (pub + allocators/sync/schemes/etc.)
#   - the rustdoc lint below (which is more doc-oriented)
missing_docs = "allow"

[lints.rustdoc]
missing_crate_level_docs = "warn"

# (raw-cpuid / x86 / sbi-rt inlined under lerux-kernel/src/lerux-{raw-cpuid,x86} and wired via #[path] in main.rs.
# Zero runtime Cargo dependencies for the kernel binary.)

[features]
default = [
  "acpi",
  #"debugger",
  "multi_core",
  "serial_debug",
  "self_modifying",
  "x86_kvm_pv",
  #"busy_panic",
  #"drop_panic",
  #"syscall_debug"
]

# Activates some limited code-overwriting optimizations, based on CPU features.
self_modifying = []

acpi = []
lpss_debug = []
multi_core = ["acpi"]
profiling = []
#TODO: remove when threading issues are fixed
pti = []
drop_panic = []
busy_panic = []
qemu_debug = []
serial_debug = []
system76_ec_debug = []
x86_kvm_pv = []
# lerux-only: QEMU -kernel path without Redox bootloader/initfs (see startup/direct_boot.rs)
direct-boot = []
# Spawn userspace_init in direct-boot mode (requires real bootstrap ELF in initfs).
direct-boot-userspace = ["direct-boot"]

debugger = ["syscall_debug"]
syscall_debug = []

sys_fdstat = []

[profile.dev]
# Avoids having to define the eh_personality lang item and reduces kernel size
panic = "abort"

[profile.release]
# Avoids having to define the eh_personality lang item and reduces kernel size
panic = "abort"
#lto = true
debug = "full"
