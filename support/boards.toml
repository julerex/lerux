# Board matrix — the single source of truth (ADR: architecture review C4).
#
# Each entry fully describes a board:
#   arch / microkit_board / target  build inputs (target json = support/targets/<target>.json)
#   template / pds / system_vars    system generation inputs
#   qemu                            QEMU launch: disk = "none"|"ro"|"rw", net = "none"|"user"|"hostfwd",
#                                   sp804 (patched QEMU), tcp_echo / http_one (host smoke helpers).
#                                   Omit `qemu` entirely for hardware-only boards.
#   ci                              board runs in `lerux test-all` (and CI smoke)
#   curl_expect                     smoke curls http://127.0.0.1:18080/ for this substring
#
# lerux-cli derives QEMU args, clippy matrices, disk/helper setup, and CI
# membership from these fields — adding a board is one TOML entry.

[qemu_virt_aarch64]
arch = "aarch64"
microkit_board = "qemu_virt_aarch64"
target = "aarch64-sel4-microkit"
template = "serial-hello.system.template"
pds = ["hello", "serial-driver"]
qemu = {}
ci = true
system_vars = { serial_mmio_phys_addr = "0x9_000_000", serial_irq = 33 }

[qemu_virt_riscv64]
arch = "riscv64"
microkit_board = "qemu_virt_riscv64"
target = "riscv64-sel4-microkit"
template = "serial-hello.system.template"
pds = ["hello", "serial-driver"]
qemu = {}
ci = true
system_vars = { serial_mmio_phys_addr = "0x1_000_0000", serial_irq = 10 }

[qemu_virt_riscv64_echo]
arch = "riscv64"
microkit_board = "qemu_virt_riscv64"
target = "riscv64-sel4-microkit"
template = "echo.system.template"
pds = ["echo-client", "echo-server", "serial-driver"]
qemu = {}
ci = true
system_vars = { serial_mmio_phys_addr = "0x1_000_0000", serial_irq = 10 }

[qemu_virt_riscv64_virtio]
arch = "riscv64"
microkit_board = "qemu_virt_riscv64"
target = "riscv64-sel4-microkit"
template = "virtio-hello-riscv.system.template"
pds = ["hello", "serial-driver", "virtio-blk-driver", "virtio-net-driver"]
qemu = { disk = "ro", net = "user", tcp_echo = true }
ci = true
system_vars = { serial_mmio_phys_addr = "0x1_000_0000", serial_irq = 10, virtio_blk_mmio_phys_addr = "0x10_001_000", virtio_net_mmio_phys_addr = "0x10_002_000", virtio_blk_irq = 1, virtio_net_irq = 2 }

[qemu_virt_riscv64_http]
arch = "riscv64"
microkit_board = "qemu_virt_riscv64"
target = "riscv64-sel4-microkit"
template = "http-virtio-riscv.system.template"
pds = ["http-server", "serial-driver", "virtio-net-driver"]
qemu = { net = "hostfwd" }
ci = true
curl_expect = "lerux: HTTP ok"
system_vars = { serial_mmio_phys_addr = "0x1_000_0000", serial_irq = 10, virtio_net_mmio_phys_addr = "0x10_002_000", virtio_net_irq = 2 }

