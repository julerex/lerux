arch = "x86_64"
microkit_board = "x86_64_generic"
target = "x86_64-sel4-microkit"
template = "net-x86.system.template"
pds = ["net-client", "net-server", "serial-driver", "virtio-pci-driver"]
qemu = { net = "user" }
ci = true
system_vars = { serial_ioport_addr = "0x3f8", serial_ioapic_pin = 4, serial_ioapic_vector = 48, virtio_net_bar1_phys_addr = "0xfed2_0000", virtio_net_bar4_phys_addr = "0xfed3_0000", virtio_net_ioapic_pin = 11, virtio_net_ioapic_vector = 50, virtio_net_driver_dma_phys_addr = "0x6000_0000", virtio_net_client_dma_phys_addr = "0x6020_0000", virtio_net_rx_free_phys_addr = "0x6040_0000", virtio_net_rx_used_phys_addr = "0x6060_0000", virtio_net_tx_free_phys_addr = "0x6080_0000", virtio_net_tx_used_phys_addr = "0x60a0_0000" }

# Real hardware example (Phase 37). Produces loader.img for deployment (U-Boot on RPi4: fatload + go 0x10000000).
# Uses PL011 at the ARM peripheral base (0xfe20_1000 on RPi4 BCM2711). IRQ is GIC SPI 121 (verify per seL4 platform).
# No QEMU profile: `just image` (or `lerux image`) only; `run`/`test` will error with guidance.
[rpi4b_4gb]
arch = "aarch64"
microkit_board = "rpi4b_4gb"
target = "aarch64-sel4-microkit"
template = "serial-hello.system.template"
pds = ["hello", "serial-driver"]
system_vars = { serial_mmio_phys_addr = "0xfe201000", serial_irq = 121 }

# RPi4 hardware with native genet (Ethernet) for net IPC (Phase 37 native driver slice)
[rpi4b_4gb_net]
arch = "aarch64"
microkit_board = "rpi4b_4gb"
target = "aarch64-sel4-microkit"
template = "net-genet-rpi.system.template"
pds = ["net-client", "net-server", "serial-driver", "genet-driver"]
system_vars = { serial_mmio_phys_addr = "0xfe201000", serial_irq = 121, genet_mmio_phys_addr = "0x7d580000", genet_irq = 157 }

# RPi4 workstation: full non-POSIX stack over native genet + emmc2 (Phase 39).
[rpi4b_4gb_workstation]
arch = "aarch64"
microkit_board = "rpi4b_4gb"
target = "aarch64-sel4-microkit"
template = "workstation-rpi4.system.template"
pds = ["supervisor", "shell", "edit", "chat-client", "http-file-browser", "backup", "fs-server", "net-server", "log-server", "config-server", "serial-driver", "serial-virt", "genet-driver", "emmc2-driver"]
system_vars = { serial_mmio_phys_addr = "0xfe201000", serial_irq = 121, genet_mmio_phys_addr = "0x7d580000", genet_irq = 157, emmc2_mmio_phys_addr = "0x7e340000", emmc2_irq = 126 }

# RPi4 hardware with native eMMC2/SD for block (Phase 37)
[rpi4b_4gb_blk]
arch = "aarch64"
microkit_board = "rpi4b_4gb"
target = "aarch64-sel4-microkit"
template = "blk-emmc-rpi.system.template"
pds = ["blk-client", "blk-server", "serial-driver", "emmc2-driver"]
system_vars = { serial_mmio_phys_addr = "0xfe201000", serial_irq = 121, emmc2_mmio_phys_addr = "0x7e340000", emmc2_irq = 126 }
