pd = "chat-client"
interface_types = "0.1.0"
description = "UDP chat client with multi-room join (shell: chat [#room])"

[fragment]
pds = ["chat-client"]
requires = ["shell", "net-server"]

[[fragment.channel]]
name = "chat_shell"
ends = [
  { pd = "shell", id = 7, pp = true },
  { pd = "chat_client", id = 0 },
]

[[fragment.channel]]
name = "chat_net"
ends = [
  { pd = "net_server", id = 6 },
  { pd = "chat_client", id = 1, pp = true },
]
