# Phase 38 TUI editor — reference package for the Phase 40 pin story.

pd = "edit"
interface_types = "0.1.0"
description = "Serial TUI text editor (FS load/save via shell proxy)"

[fragment]
pds = ["edit"]
requires = ["shell", "fs-server"]

[[fragment.channel]]
name = "edit_shell"
ends = [
  { pd = "shell", id = 6, pp = true },
  { pd = "edit", id = 0 },
]

[[fragment.channel]]
name = "edit_fs"
ends = [
  { pd = "fs_server", id = 6 },
  { pd = "edit", id = 1, pp = true },
]
