# Profile `dev-workstation` — managed by `lerux package install|remove` (Phase 55).
# Template + default_board are authoritative; channels are the IPC source of truth.

template = "workstation.system.template"
pds = [
    "supervisor",
    "shell",
    "fs-server",
    "net-server",
    "log-server",
    "config-server",
    "serial-driver",
    "serial-virt",
    "pl031-driver",
    "sp804-driver",
    "virtio-blk-driver",
    "virtio-net-driver",
]
description = "Phase 55: workstation core — install edit/chat/http-fs via package CLI"
default_board = "qemu_virt_aarch64_workstation"

[[channel]]
name = "driver_virt"

[[channel.ends]]
pd = "serial_driver"
id = 1
pp = false

[[channel.ends]]
pd = "serial_virt"
id = 0
pp = true

[[channel]]
name = "shell_serial"

[[channel.ends]]
