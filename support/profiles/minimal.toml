# Minimal system profile: basic hello over serial.
# Corresponds to boards like qemu_virt_aarch64, x86_64_generic, etc.

template = "serial-hello.system.template"
pds = ["hello", "serial-driver"]
description = "Minimal hello world over serial driver"

default_board = "qemu_virt_aarch64"

[[channel]]
name = "hello_serial"
ends = [
  { pd = "serial_driver", id = 1 },
  { pd = "hello", id = 0, pp = true },
]
