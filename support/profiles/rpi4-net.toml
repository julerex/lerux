# RPi4 hardware net profile using native genet driver (Phase 37).
# After building a full SDK with rpi4b board:
#   BOARD=rpi4b_4gb_net just image
# Deploy and test manual UDP TX smoke.

template = "net-genet-rpi.system.template"
pds = ["net-client", "net-server", "serial-driver", "genet-driver"]
description = "Net over native RPi4 genet Ethernet"
default_board = "rpi4b_4gb_net"
trust_class = "appliance"

[[channel]]
name = "net_client_serial"
ends = [
  { pd = "serial_driver", id = 1 },
  { pd = "net_client", id = 0, pp = true },
]

[[channel]]
name = "net_genet"
ends = [
  { pd = "genet_driver", id = 1 },
  { pd = "net_server", id = 1, pp = true },
]

[[channel]]
name = "net_client_rpc"
ends = [
  { pd = "net_server", id = 2 },
  { pd = "net_client", id = 1, pp = true },
]
