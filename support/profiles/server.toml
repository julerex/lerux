# Server-oriented profile example: echo service.
# Demonstrates a typed IPC server package wired to clients.

template = "echo.system.template"
pds = ["echo-client", "echo-server", "serial-driver"]
description = "Echo client/server (typed IPC demo) + serial"

default_board = "qemu_virt_aarch64_echo"

channels = [
  "serial_driver <-> echo-client",
  "echo-client <-> echo-server",
]
