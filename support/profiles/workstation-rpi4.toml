# RPi4 workstation profile (Phase 39/40).
# Supervisor + FS + net + shell + log + config + edit/chat/http-fs over native genet + emmc2.
#
# Build: lerux profile build workstation-rpi4
#        (or BOARD=rpi4b_4gb_workstation just image)
#
# On-device gate — see docs/boards.md#rpi4-workstation-manual-hw-gate-phase-39:
#   1. Copy build/rpi4b_4gb_workstation/loader.img to SD FAT boot partition
#   2. U-Boot: fatload mmc 0 0x10000000 loader.img; go 0x10000000
#   3. Optional: LERUX_HW_SERIAL=/dev/ttyUSB0 BOARD=rpi4b_4gb_workstation just test
#   4. At lerux> prompt: ls, cat /boot.log, fetch, edit /test.txt, top, chat

template = "workstation-rpi4.system.template"
pds = [
  "supervisor",
  "shell",
  "edit",
  "chat-client",
  "http-file-browser",
  "fs-server",
  "net-server",
  "log-server",
  "config-server",
  "serial-driver",
  "genet-driver",
  "emmc2-driver",
]
description = "RPi4 workstation: supervisor + FS + net + shell + Phase 40 apps"

default_board = "rpi4b_4gb_workstation"

channels = [
  "serial_driver:1 <-> shell:0 (pp)",
  "serial_driver:2 <-> supervisor:0 (pp)",
  "serial_driver:3 <-> log_server:0 (pp)",
  "emmc2_driver:1 <-> fs_server:1 (pp)",
  "fs_server:2 <-> supervisor:3 (pp)",
  "fs_server:3 <-> shell:1 (pp)",
  "fs_server:4 <-> log_server:3 (pp)",
  "genet_driver:1 <-> net_server:1 (pp)",
  "net_server:2 <-> supervisor:4 (pp)",
  "net_server:3 <-> shell:2 (pp)",
  "net_server:4 <-> log_server:4 (pp)",
  "supervisor:5 <-> shell:3 (pp)",
  "supervisor:6 <-> log_server:2 (pp)",
  "log_server:1 <-> shell:4 (pp)",
  "supervisor:7 <-> config_server:0 (pp)",
  "shell:5 <-> config_server:1 (pp)",
  "net_server:5 <-> config_server:2 (pp)",
  "fs_server:5 <-> config_server:3 (pp)",
  "shell:6 <-> edit:0 (pp)",
  "fs_server:6 <-> edit:1 (pp)",
  "shell:7 <-> chat-client:0 (pp)",
  "net_server:6 <-> chat-client:1 (pp)",
  "net_server:7 <-> http-file-browser:0 (pp)",
  "fs_server:7 <-> http-file-browser:1 (pp)",
]
