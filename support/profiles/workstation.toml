# Workstation system profile: supervisor + fs + net + shell on virtio.
# Full non-POSIX workstation experience (Phase 40 apps: top/chat/http-fs).
#
# Arch-specific drivers and block/net driver channels are in this overlay;
# shared app channels live in `workstation-base`.

extends = "workstation-base"
template = "workstation.system.template"
description = "Supervisor + FS + net + shell + edit/chat/http-fs apps (serial virt Phase 42)"
default_board = "qemu_virt_aarch64_workstation"

pds = ["pl031-driver", "sp804-driver", "virtio-blk-driver", "virtio-net-driver"]

[[channel]]
name = "supervisor_rtc"
ends = [
  { pd = "pl031_driver", id = 1 },
  { pd = "supervisor", id = 1, pp = true },
]

[[channel]]
name = "supervisor_timer"
ends = [
  { pd = "sp804_driver", id = 1 },
  { pd = "supervisor", id = 2, pp = true },
]

[[channel]]
name = "fs_blk_driver"
ends = [
  { pd = "virtio_blk_driver", id = 1 },
  { pd = "fs_server", id = 1, pp = true },
]

[[channel]]
name = "net_driver"
ends = [
  { pd = "virtio_net_driver", id = 1 },
  { pd = "net_server", id = 1, pp = true },
]
