# Workstation system profile: supervisor + fs + net + shell on virtio.
# Full non-POSIX workstation experience (Phase 40 apps: top/chat/http-fs).
#
# Channel topology is structured (Phase 41). SDF names use underscores.
# Exact ends match userspace/systems/templates/workstation.system.template.

template = "workstation.system.template"
pds = [
  "supervisor",
  "shell",
  "edit",
  "chat-client",
  "http-file-browser",
  "fs-server",
  "net-server",
  "log-server",
  "config-server",
  "serial-driver",
  "serial-virt",
  "pl031-driver",
  "sp804-driver",
  "virtio-blk-driver",
  "virtio-net-driver",
]
description = "Supervisor + FS + net + shell + edit/chat/http-fs apps (serial virt Phase 42)"

default_board = "qemu_virt_aarch64_workstation"

# Phase 42: clients → serial_virt; driver ↔ virt queues + notify.
[[channel]]
name = "driver_virt"
ends = [
  { pd = "serial_driver", id = 1 },
  { pd = "serial_virt", id = 0 },
]

[[channel]]
name = "shell_serial"
ends = [
  { pd = "serial_virt", id = 1 },
  { pd = "shell", id = 0, pp = true },
]

[[channel]]
name = "supervisor_serial"
ends = [
  { pd = "serial_virt", id = 2 },
  { pd = "supervisor", id = 0, pp = true },
]

[[channel]]
name = "log_serial"
ends = [
  { pd = "serial_virt", id = 3 },
  { pd = "log_server", id = 0, pp = true },
]

[[channel]]
name = "supervisor_rtc"
ends = [
  { pd = "pl031_driver", id = 1 },
  { pd = "supervisor", id = 1, pp = true },
]

[[channel]]
name = "supervisor_timer"
ends = [
  { pd = "sp804_driver", id = 1 },
  { pd = "supervisor", id = 2, pp = true },
]

[[channel]]
name = "fs_blk_driver"
ends = [
  { pd = "virtio_blk_driver", id = 1 },
  { pd = "fs_server", id = 1, pp = true },
]

[[channel]]
name = "supervisor_fs"
ends = [
  { pd = "fs_server", id = 2 },
  { pd = "supervisor", id = 3, pp = true },
]

[[channel]]
name = "shell_fs"
ends = [
  { pd = "fs_server", id = 3 },
  { pd = "shell", id = 1, pp = true },
]

[[channel]]
name = "net_driver"
ends = [
  { pd = "virtio_net_driver", id = 1 },
  { pd = "net_server", id = 1, pp = true },
]

[[channel]]
name = "supervisor_net"
ends = [
  { pd = "net_server", id = 2 },
  { pd = "supervisor", id = 4, pp = true },
]

[[channel]]
name = "shell_net"
ends = [
  { pd = "net_server", id = 3 },
  { pd = "shell", id = 2, pp = true },
]

[[channel]]
name = "shell_supervisor"
ends = [
  { pd = "supervisor", id = 5 },
  { pd = "shell", id = 3, pp = true },
]

[[channel]]
name = "shell_log"
ends = [
  { pd = "log_server", id = 1 },
  { pd = "shell", id = 4, pp = true },
]

[[channel]]
name = "supervisor_log"
ends = [
  { pd = "log_server", id = 2 },
  { pd = "supervisor", id = 6, pp = true },
]

[[channel]]
name = "fs_log"
ends = [
  { pd = "log_server", id = 3 },
  { pd = "fs_server", id = 4, pp = true },
]

[[channel]]
name = "net_log"
ends = [
  { pd = "log_server", id = 4 },
  { pd = "net_server", id = 4, pp = true },
]

[[channel]]
name = "config_fs"
ends = [
  { pd = "fs_server", id = 5 },
  { pd = "config_server", id = 3, pp = true },
]

[[channel]]
name = "config_supervisor"
ends = [
  { pd = "supervisor", id = 7, pp = true },
  { pd = "config_server", id = 0 },
]

[[channel]]
name = "config_shell"
ends = [
  { pd = "shell", id = 5, pp = true },
  { pd = "config_server", id = 1 },
]

[[channel]]
name = "config_net"
ends = [
  { pd = "net_server", id = 5 },
  { pd = "config_server", id = 2, pp = true },
]

[[channel]]
name = "edit_shell"
ends = [
  { pd = "shell", id = 6, pp = true },
  { pd = "edit", id = 0 },
]

[[channel]]
name = "edit_fs"
ends = [
  { pd = "fs_server", id = 6 },
  { pd = "edit", id = 1, pp = true },
]

[[channel]]
name = "chat_shell"
ends = [
  { pd = "shell", id = 7, pp = true },
  { pd = "chat_client", id = 0 },
]

[[channel]]
name = "chat_net"
ends = [
  { pd = "net_server", id = 6 },
  { pd = "chat_client", id = 1, pp = true },
]

[[channel]]
name = "http_fs_net"
ends = [
  { pd = "net_server", id = 7 },
  { pd = "http_file_browser", id = 0, pp = true },
]

[[channel]]
name = "http_fs_fs"
ends = [
  { pd = "fs_server", id = 7 },
  { pd = "http_file_browser", id = 1, pp = true },
]
