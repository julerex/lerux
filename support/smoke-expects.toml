# Phase 47/52: data-driven smoke expects shared by QEMU and hw-serial modes.
# Loaded by lerux-cli (`test` / `test-all`). Edit here when adding boards.
#
# [boards.<name>]
# expects = ["ordered substrings…"]  # required
# unordered = true                   # optional (default false)
# timeout_secs = 120                 # optional (default 60; hw often 120)
# script_timeout_secs = 30           # optional; per-step timeout for hw script
# script = [ { send = "ls\r", expect = "boot.log" }, … ]  # Phase 52 hw-serial REPL

[defaults]
timeout_secs = 60
unordered = false
script_timeout_secs = 30

[boards.qemu_virt_aarch64]
expects = ["lerux: Hello from Rust on seL4 Microkit!"]

[boards.qemu_virt_riscv64]
expects = ["lerux: Hello from Rust on seL4 Microkit!"]

[boards.x86_64_generic]
expects = ["lerux: Hello from Rust on seL4 Microkit!"]

[boards.rpi4b_4gb]
expects = ["lerux: Hello from Rust on seL4 Microkit!"]

[boards.qemu_virt_aarch64_echo]
expects = ["echo-server ready", "lerux-echo: pong", "lerux-echo: lerux"]

[boards.qemu_virt_aarch64_bench_echo]
timeout_secs = 90
expects = [
  "echo-server ready",
  "lerux-echo: pong",
  "lerux-bench: echo start",
  "lerux-bench: echo done",
]

[boards.qemu_virt_aarch64_bench_blk]
timeout_secs = 120
expects = [
  "lerux-blk: ready",
  "lerux-blk: write round-trip ok",
  "lerux-bench: blk_read start",
  "lerux-bench: blk_read done",
]

[boards.qemu_virt_aarch64_bench_net]
timeout_secs = 120
expects = [
  "lerux-net: ready",
  "lerux-net: IPC ok",
  "lerux-bench: udp_tx start",
  "lerux-bench: udp_tx done",
]

[boards.qemu_virt_riscv64_echo]
