[boards.qemu_virt_aarch64_workstation]
unordered = true
timeout_secs = 60
expects = [
  "lerux-supervisor: RTC",
  "lerux-supervisor: timer ok",
  "lerux-supervisor: init ok",
  "log-server: ready ring=",
  "lerux-fs: ready",
  "virtio-blk:",
  "lerux-net: ready",
  "virtio-net: MAC",
  "lerux-supervisor: fs up",
  "lerux-supervisor: config hostname=",
  "lerux-supervisor: net up",
  "lerux-supervisor: ready",
  "lerux-shell: ready",
  "lerux-shell: qos ok",
  "lerux-shell: cmds=",
  "lerux-edit: ready",
  "lerux-chat: ready",
  "lerux-backup:",
  "lerux-http-fs:",
  "v2 mime",
  "lerux-shell: top count=",
]

# Phase 59: multi-arch workstation (same guest expects; hostfwd curl via default_curls).
[boards.qemu_virt_riscv64_workstation]
unordered = true
timeout_secs = 90
expects = [
  "lerux-supervisor: RTC",
  "lerux-supervisor: timer ok",
  "lerux-supervisor: init ok",
  "log-server: ready ring=",
  "lerux-fs: ready",
  "virtio-blk:",
  "lerux-net: ready",
  "virtio-net: MAC",
  "lerux-supervisor: fs up",
  "lerux-supervisor: config hostname=",
  "lerux-supervisor: net up",
  "lerux-supervisor: ready",
  "lerux-shell: ready",
  "lerux-shell: qos ok",
  "lerux-shell: cmds=",
  # App PDs log concurrently via serial-virt; full "lerux-*: ready" lines often
  # fragment. Shell top count is the liveness proxy for the app set.
  "lerux-shell: top count=",
]

[boards.x86_64_generic_workstation]
unordered = true
timeout_secs = 90
expects = [
  "lerux-supervisor: RTC",
  "lerux-supervisor: timer ok",
  "lerux-supervisor: init ok",
  "log-server: ready ring=",
  "lerux-fs: ready",
  "virtio-blk:",
  "lerux-net: ready",
  "virtio-net: MAC",
  "lerux-supervisor: fs up",
  "lerux-supervisor: config hostname=",
  "lerux-supervisor: net up",
  "lerux-supervisor: ready",
  "lerux-shell: ready",
  "lerux-shell: qos ok",
  "lerux-shell: cmds=",
  "lerux-shell: top count=",
]

# --- Hardware (hw-serial mode) ---

[boards.rpi4b_4gb_workstation]
unordered = true
timeout_secs = 120
script_timeout_secs = 45
expects = [
  "lerux-supervisor: init ok",
  "genet:",
  "emmc2:",
  "lerux-fs: ready",
  "lerux-net: ready",
  "lerux-supervisor: fs up",
  "lerux-supervisor: config hostname=",
  "lerux-supervisor: net up",
  "lerux-supervisor: ready",
  "lerux-shell: ready",
  "lerux-shell: qos ok",
  "lerux-shell: cmds=",
  "lerux-edit: ready",
  "lerux-chat: ready",
  "lerux-http-fs:",
]
# Phase 52–54: after boot strings match, inject REPL commands over the same TTY.
# Requires the shell prompt to be live; power-on/reset the board before/while test-hw runs.
script = [
  { send = "ls\r", expect = "boot.log" },
  { send = "pwd\r", expect = "/" },
  { send = "ip\r", expect = "inet" },
  { send = "help -l\r", expect = "cmds=" },
  { send = "df\r", expect = "leruxfs" },
  { send = "uptime\r", expect = "up " },
  { send = "hostname\r", expect = "lerux" },
  { send = "config list\r", expect = "hostname" },
]

[boards.rpi4b_4gb_net]
timeout_secs = 120
expects = ["lerux-net: ready", "genet:", "genet-driver: ready"]

[boards.rpi4b_4gb_blk]
timeout_secs = 120
expects = ["lerux-blk: ready", "emmc2:", "emmc2-driver: ready"]
