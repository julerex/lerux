[workspace]
resolver = "2"
members = [
    "config",
    "daemon",
    "scheme-utils",
    "init",
    "logd",
    "zerod",
    "randd",
    "ramfs",
    "drivers/common",
    "drivers/rtcd",
]
exclude = ["bootstrap", "initfs", "initfs-tools"]

[workspace.dependencies]
anyhow = "1"
log = "0.4"
libredox = "0.1.17"
plain = "0.2.3"
redox-log = { path = "../vendor/redox-log" }
redox-scheme = "0.11.1"
redox_syscall = { version = "0.8.0", features = ["std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
slab = "0.4.9"
toml = "1"

[workspace.lints.rust]
missing_docs = "allow"

[workspace.lints.clippy]
missing_safety_doc = "warn"
precedence = "deny"
