[package]
name = "fs-server"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lints]
workspace = true

[features]
default = []
# Phase 44: alternate on-disk format behind the same FsRequest IPC.
backend-lerux = []
backend-fat = ["dep:lerux-fat"]
board-qemu_virt_aarch64_fs = ["backend-lerux"]
board-qemu_virt_aarch64_fs_fat = ["backend-fat"]
workstation = []
board-qemu_virt_aarch64_workstation = ["workstation", "backend-lerux"]
board-qemu_virt_riscv64_workstation = ["workstation", "backend-lerux"]
board-x86_64_generic_workstation = ["workstation", "backend-lerux"]
board-rpi4b_4gb_workstation = ["workstation", "backend-lerux"]

[dependencies]
async-unsync = { version = "0.3.0", default-features = false }
lerux-fs = { path = "../../crates/lerux-fs" }
lerux-fat = { path = "../../crates/lerux-fat", optional = true }
lerux-service-async = { path = "../../crates/lerux-service-async" }
lerux-interface-types = { path = "../../crates/lerux-interface-types" }
lerux-ipc = { path = "../../crates/lerux-ipc" }
lerux-logging = { path = "../../crates/lerux-logging", features = ["server"] }
sel4-abstract-allocator = { workspace = true }
sel4-driver-interfaces = { workspace = true }
sel4-microkit = { workspace = true, features = ["alloc"] }
sel4-microkit-driver-adapters = { workspace = true }
sel4-shared-memory = { workspace = true }
sel4-shared-ring-buffer = { workspace = true }
sel4-shared-ring-buffer-block-io = { workspace = true }
sel4-shared-ring-buffer-block-io-types = { workspace = true }
sel4-shared-ring-buffer-bookkeeping = { workspace = true, features = ["async-unsync"] }
