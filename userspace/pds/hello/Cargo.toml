[package]
name = "hello"
version = "0.1.0"
edition = "2024"
license = "MIT"

[features]
board-qemu_virt_aarch64 = ["serial-ipc"]
board-qemu_virt_aarch64_virtio = ["serial-ipc", "virtio"]
board-x86_64_generic = ["serial-ipc"]
serial-ipc = ["lerux-logging/serial"]
virtio = ["dep:sel4-driver-interfaces", "dep:sel4-microkit-driver-adapters"]

[dependencies]
sel4-microkit = { workspace = true }
sel4-driver-interfaces = { workspace = true, optional = true }
sel4-microkit-driver-adapters = { workspace = true, optional = true }
lerux-logging = { path = "../../crates/lerux-logging" }