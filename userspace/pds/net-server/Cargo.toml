[package]
name = "net-server"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lints]
workspace = true

[features]
# Phase 43: bounce is high half of driver_dma (shared MR with driver).
unified-dma = []
board-qemu_virt_aarch64_net = ["unified-dma"]
board-qemu_virt_aarch64_fetch = ["unified-dma"]
board-qemu_virt_aarch64_net_composed = ["unified-dma"]
workstation = []
board-qemu_virt_aarch64_workstation = ["workstation", "unified-dma"]
board-rpi4b_4gb_workstation = ["workstation"]
board-rpi4b_4gb_net = []
board-qemu_virt_aarch64_ipc_composed = ["unified-dma"]
board-qemu_virt_riscv64_net = []
board-x86_64_generic_net = []

[dependencies]
lerux-interface-types = { path = "../../crates/lerux-interface-types" }
lerux-ipc = { path = "../../crates/lerux-ipc" }
lerux-logging = { path = "../../crates/lerux-logging", features = ["server"] }
sel4-abstract-allocator = { workspace = true }
sel4-driver-interfaces = { workspace = true }
sel4-microkit = { workspace = true, features = ["alloc"] }
sel4-microkit-driver-adapters = { workspace = true }
sel4-shared-memory = { workspace = true }
sel4-shared-ring-buffer = { workspace = true }
sel4-shared-ring-buffer-smoltcp = { workspace = true }
smoltcp = { workspace = true, features = ["medium-ethernet", "proto-ipv4", "socket-udp", "socket-tcp"] }