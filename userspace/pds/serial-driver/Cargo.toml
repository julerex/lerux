[package]
name = "serial-driver"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lints]
workspace = true

[features]
multi-client-2 = []
multi-client-3 = []
board-qemu_virt_aarch64 = ["sel4-pl011-driver"]
board-qemu_virt_aarch64_virtio = ["board-qemu_virt_aarch64"]
board-qemu_virt_aarch64_echo = ["board-qemu_virt_aarch64", "multi-client-2"]
board-qemu_virt_aarch64_init = ["board-qemu_virt_aarch64"]
board-qemu_virt_aarch64_blk_composed = ["board-qemu_virt_aarch64", "multi-client-2"]
board-qemu_virt_aarch64_net_composed = ["board-qemu_virt_aarch64", "multi-client-2"]
board-qemu_virt_aarch64_ipc_composed = ["board-qemu_virt_aarch64", "multi-client-3"]
board-qemu_virt_aarch64_composed = ["board-qemu_virt_aarch64", "multi-client-2"]
board-qemu_virt_aarch64_http = ["board-qemu_virt_aarch64"]
board-qemu_virt_aarch64_http_composed = ["board-qemu_virt_aarch64", "multi-client-2"]
board-qemu_virt_aarch64_blk = ["board-qemu_virt_aarch64"]
board-qemu_virt_aarch64_net = ["board-qemu_virt_aarch64"]
board-qemu_virt_aarch64_fetch = ["board-qemu_virt_aarch64"]
board-qemu_virt_aarch64_fs = ["board-qemu_virt_aarch64"]
board-qemu_virt_aarch64_workstation = ["board-qemu_virt_aarch64", "multi-client-3"]
board-qemu_virt_riscv64 = []
board-qemu_virt_riscv64_echo = ["board-qemu_virt_riscv64", "multi-client-2"]
board-qemu_virt_riscv64_virtio = ["board-qemu_virt_riscv64"]
board-qemu_virt_riscv64_http = ["board-qemu_virt_riscv64"]
board-qemu_virt_riscv64_blk = ["board-qemu_virt_riscv64"]
board-qemu_virt_riscv64_net = ["board-qemu_virt_riscv64"]
board-x86_64_generic = []
board-x86_64_generic_echo = ["board-x86_64_generic", "multi-client-2"]
board-x86_64_generic_virtio = ["board-x86_64_generic"]
board-x86_64_generic_http = ["board-x86_64_generic"]
board-x86_64_generic_blk = ["board-x86_64_generic"]
board-x86_64_generic_net = ["board-x86_64_generic"]

board-rpi4b_4gb = ["board-qemu_virt_aarch64"]
board-rpi4b_4gb_net = ["board-rpi4b_4gb"]
board-rpi4b_4gb_blk = ["board-rpi4b_4gb"]

[dependencies]
lerux-logging = { path = "../../crates/lerux-logging" }
log = { workspace = true }
sel4 = { workspace = true }
sel4-microkit = { workspace = true }
sel4-driver-interfaces = { workspace = true }
sel4-pl011-driver = { workspace = true, optional = true }
embedded-hal-nb = { workspace = true }
heapless = { workspace = true }
serde = { workspace = true }
sel4-microkit-simple-ipc = { workspace = true }
