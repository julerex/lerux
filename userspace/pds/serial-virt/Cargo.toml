[package]
name = "serial-virt"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Serial virtualiser: multi-client postcard RPC to device-only serial-driver"

[lints]
workspace = true

[features]
multi-client-2 = []
multi-client-3 = []
board-qemu_virt_aarch64_workstation = ["multi-client-3"]
board-rpi4b_4gb_workstation = ["multi-client-3"]
board-qemu_virt_riscv64_workstation = ["multi-client-3"]
board-x86_64_generic_workstation = ["multi-client-3"]

[dependencies]
lerux-logging = { path = "../../crates/lerux-logging" }
log = { workspace = true }
sel4-microkit = { workspace = true }
heapless = { workspace = true }
serde = { workspace = true }
sel4-microkit-simple-ipc = { workspace = true }
embedded-hal-nb = { workspace = true }
