[package]
name = "virtio-net-driver"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lints]
workspace = true

[features]
# Phase 43: no separate client_dma MR; bounce is high half of driver_dma.
unified-dma = []
board-qemu_virt_aarch64_virtio = ["unified-dma"]
board-qemu_virt_aarch64_composed = ["unified-dma"]
board-qemu_virt_aarch64_http = ["unified-dma"]
board-qemu_virt_aarch64_http_composed = ["unified-dma"]
board-qemu_virt_aarch64_net = ["unified-dma"]
board-qemu_virt_aarch64_bench_net = ["unified-dma"]
board-qemu_virt_aarch64_fetch = ["unified-dma"]
board-qemu_virt_aarch64_net_composed = ["unified-dma"]
board-qemu_virt_aarch64_ipc_composed = ["unified-dma"]
board-qemu_virt_aarch64_workstation = ["unified-dma"]
board-qemu_virt_riscv64_virtio = []
board-qemu_virt_riscv64_http = []
board-qemu_virt_riscv64_net = []
board-x86_64_generic_virtio = ["dep:lerux-virtio-hal", "dep:lerux-virtio-pci"]
board-x86_64_generic_http = ["dep:lerux-virtio-hal", "dep:lerux-virtio-pci"]

[dependencies]
log = { workspace = true }
sel4-microkit = { workspace = true }
sel4-microkit-driver-adapters = { workspace = true }
sel4-shared-memory = { workspace = true }
sel4-shared-ring-buffer = { workspace = true }
sel4-virtio-hal-impl = { workspace = true }
lerux-virtio-hal = { workspace = true, optional = true }
lerux-virtio-pci = { workspace = true, optional = true }
sel4-virtio-net = { workspace = true }
virtio-drivers = { workspace = true, features = ["alloc"] }
lerux-logging = { path = "../../crates/lerux-logging" }
