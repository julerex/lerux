[package]
name = "redox-rt"
authors = ["4lDO2 <4lDO2@protonmail.com>"]
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Libc-independent runtime for Redox"

# lerux: explicit deps so bootstrap can path-depend outside the relibc workspace.

[dependencies]
bitflags = "2"
goblin = { version = "0.10", default-features = false, features = ["elf32", "elf64", "endian_fd"] }
plain = "0.2"
ioslice = { version = "0.6", default-features = false }
redox_syscall = "0.8.0"
redox-path = "0.3"
redox_protocols = { package = "libredox", version = "0.1.17", default-features = false, features = ["protocol"] }

generic-rt = { path = "../generic-rt" }

[features]
proc = []
default = ["proc"]
